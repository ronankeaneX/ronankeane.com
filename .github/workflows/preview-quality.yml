name: Preview quality gate

# Lighthouse + schema validation on every PR and on push to main.
# Dormant until the repo is pushed to GitHub. Required-status check
# wiring happens in the GitHub repo settings once it's live.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check + build
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --collect.staticDistDir=./dist --upload.target=temporary-public-storage
        continue-on-error: false

      - name: Schema validation
        # TODO: wire structured-data-testing-tool or schema-dts checks
        # once the BaseLayout starts emitting JSON-LD. Currently a no-op.
        run: echo "Schema validation placeholder — implement once JSON-LD is generated by BaseLayout."
